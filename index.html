<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #10b981;
    --orange: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --red: #ef4444;
    --tag-new: #064e3b;
    --tag-new-text: #34d399;
    --tag-promo: #1e1b4b;
    --tag-promo-text: #818cf8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(59,130,246,0.6));
  }
  .logo-text h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-text .sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .update-badge {
    font-size: 12px;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
  }
  .update-badge span { color: var(--accent2); font-weight: 600; }

  /* Stats bar */
  .stats-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
  }
  .stats-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
  }
  .stat-num {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-blue { background: var(--accent); }
  .dot-green { background: var(--green); }
  .dot-orange { background: var(--orange); }

  /* Filters */
  .filters {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 0 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    transition: border-color .2s;
  }
  .filter-group:focus-within { border-color: var(--accent); }
  .filter-group label {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }
  .filter-group select, .filter-group input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .filter-group select option { background: #1a2235; }
  .search-group {
    flex: 1;
    min-width: 220px;
  }
  .search-group input { width: 100%; }

  .filter-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Date range pills */
  .date-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .date-pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .date-pill:hover { border-color: var(--accent); color: var(--accent); }
  .date-pill.active {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* Main content */
  .main {
    max-width: 1400px;
    margin: 24px auto;
    padding: 0 32px 48px;
  }

  /* Result info */
  .result-info {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-info strong { color: var(--text2); }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  /* Route card */
  .route-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all .25s;
    cursor: pointer;
    position: relative;
  }
  .route-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(59,130,246,0.15);
  }
  .route-card.expanded { border-color: var(--accent2); }

  .card-header {
    padding: 16px 18px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .card-airline {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .airline-avatar {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    font-family: monospace;
  }
  .airline-info .name { font-size: 14px; font-weight: 600; }
  .airline-info .date { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .card-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-new { background: var(--tag-new); color: var(--tag-new-text); }
  .badge-promo { background: var(--tag-promo); color: var(--tag-promo-text); }
  .badge-source {
    background: rgba(100,116,139,0.2);
    color: var(--text3);
    border: 1px solid var(--border);
  }

  .card-route {
    padding: 0 18px 14px;
  }
  .route-display {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .city { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .city small { display: block; font-size: 11px; font-weight: 400; color: var(--text3); }
  .route-arrow {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--accent);
  }
  .route-arrow .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .route-arrow .plane { font-size: 16px; }

  .card-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .meta-item {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .meta-item strong { color: var(--text2); }

  .card-summary {
    padding: 0 18px 14px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .source-link {
    font-size: 12px;
    color: var(--accent2);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: opacity .2s;
  }
  .source-link:hover { opacity: 0.8; }
  .expand-hint {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .expand-arrow { transition: transform .2s; }
  .expanded .expand-arrow { transform: rotate(180deg); }

  /* Expanded panel */
  .card-detail {
    display: none;
    padding: 16px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .expanded .card-detail { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-item label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 3px;
  }
  .detail-item span {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  .detail-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .detail-source {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 8px;
  }
  .detail-source .icon { font-size: 18px; }
  .detail-source .info { flex: 1; }
  .detail-source .info .sname { font-size: 12px; font-weight: 600; color: var(--text2); }
  .detail-source .info .surl {
    font-size: 11px;
    color: var(--accent2);
    text-decoration: none;
    word-break: break-all;
    display: block;
    margin-top: 2px;
  }
  .detail-source .info .surl:hover { text-decoration: underline; }
  .open-btn {
    padding: 7px 16px;
    background: var(--accent);
    color: white;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity .2s;
    cursor: pointer;
    border: none;
  }
  .open-btn:hover { opacity: 0.85; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Loading shimmer */
  @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  .shimmer {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 400px 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .header, .stats-bar { padding: 16px; }
    .filters, .main { padding: 0 16px; }
    .filters { margin-top: 16px; }
    .main { margin-top: 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

</div>

let allRoutes = __DATA__.routes || [];
let currentDays = 14;
let expandedId = null;

function formatDate(str) {
  if (!str) return '—';
  try {
    const d = new Date(str);
    return d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
  } catch { return str; }
}

function formatDateTime(str) {
  if (!str) return '—';
  try {
    const d = new Date(str);
    return d.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch { return str; }
}

function getAirlineAbbr(name) {
  if (!name) return '✈';
  const map = {
    '中国国际航空': 'CA', '南方航空': 'CZ', '东方航空': 'MU',
    '海南航空': 'HU', '厦门航空': 'MF', '深圳航空': 'ZH',
    '四川航空': '3U', '山东航空': 'SC', '国泰航空': 'CX',
    '新加坡航空': 'SQ', '阿联酋航空': 'EK', '卡塔尔航空': 'QR',
    '达美航空': 'DL', '美国航空': 'AA', '联合航空': 'UA',
    '英国航空': 'BA', '法国航空': 'AF', '汉莎航空': 'LH',
  };
  for (const [k, v] of Object.entries(map)) {
    if (name.includes(k.substring(0, 3))) return v;
  }
  // 取前2个汉字首字母或前2字母
  const cn = name.match(/[\u4e00-\u9fff]/g);
  if (cn && cn.length >= 2) return cn[0] + cn[1];
  return name.substring(0, 2).toUpperCase();
}

function getAirlineColor(name) {
  const colors = [
    ['135deg, #1d4ed8, #3b82f6'],
    ['135deg, #065f46, #10b981'],
    ['135deg, #7c3aed, #a78bfa'],
    ['135deg, #b45309, #f59e0b'],
    ['135deg, #be185d, #f472b6'],
    ['135deg, #0f766e, #06b6d4'],
    ['135deg, #9f1239, #fb7185'],
    ['135deg, #1e3a8a, #60a5fa'],
  ];
  let hash = 0;
  for (const c of (name || '')) hash = (hash * 31 + c.charCodeAt(0)) & 0xffff;
  return colors[hash % colors.length][0];
}

function isWithinDays(dateStr, days) {
  if (!days || days === 0) return true;
  if (!dateStr) return true;
  try {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = (now - d) / (1000 * 60 * 60 * 24);
    return diff <= days;
  } catch { return true; }
}

function buildCard(r) {
  const abbr = getAirlineAbbr(r.airline);
  const color = getAirlineColor(r.airline);
  const typeBadge = r.type === 'new_route'
    ? '<span class="badge badge-new">✦ 新开航线</span>'
    : '<span class="badge badge-promo">★ 主推航线</span>';
  const isExp = expandedId === r.id;

  const originCity = r.origin || (r.route ? r.route.split(/[-—→]/)[0].trim() : '—');
  const destCity = r.destination || (r.route ? r.route.split(/[-—→]/).slice(-1)[0].trim() : '—');

  return `
  <div class="route-card ${isExp ? 'expanded' : ''}" id="card-${r.id}" onclick="toggleCard('${r.id}')">
    <div class="card-header">
      <div class="card-airline">
        <div class="airline-avatar" style="background:linear-gradient(${color})">${abbr}</div>
        <div class="airline-info">
          <div class="name">${r.airline || '未知航司'}</div>
          <div class="date">发布 ${formatDate(r.date)}</div>
        </div>
      </div>
      <div class="card-badges">
        ${typeBadge}
        <span class="badge badge-source">${r.source_name || '未知来源'}</span>
      </div>
    </div>

    <div class="card-route">
      <div class="route-display">
        <div class="city">${originCity}<small>${r.origin || ''}</small></div>
        <div class="route-arrow">
          <div class="line"></div>
          <div class="plane">✈</div>
          <div class="line"></div>
        </div>
        <div class="city">${destCity}<small>${r.destination || ''}</small></div>
      </div>
      <div class="card-meta">
        ${r.flight_no ? `<div class="meta-item">🔢 <strong>${r.flight_no}</strong></div>` : ''}
        ${r.frequency ? `<div class="meta-item">📅 <strong>${r.frequency}</strong></div>` : ''}
        ${r.start_date ? `<div class="meta-item">🚀 首航 <strong>${formatDate(r.start_date)}</strong></div>` : ''}
      </div>
    </div>

    ${r.summary ? `<div class="card-summary">${r.summary}</div>` : ''}

    <div class="card-footer">
      <a class="source-link" href="${r.source_url || '#'}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        🔗 查看原文
      </a>
      <div class="expand-hint">
        详情 <span class="expand-arrow">▾</span>
      </div>
    </div>

    <div class="card-detail" onclick="event.stopPropagation()">
      <div class="detail-grid">
        <div class="detail-item">
          <label>航司</label>
          <span>${r.airline || '—'}${r.airline_en ? ' / ' + r.airline_en : ''}</span>
        </div>
        <div class="detail-item">
          <label>航班号</label>
          <span>${r.flight_no || '—'}</span>
        </div>
        <div class="detail-item">
          <label>航线</label>
          <span>${r.route || originCity + ' — ' + destCity}</span>
        </div>
        <div class="detail-item">
          <label>班期频率</label>
          <span>${r.frequency || '—'}</span>
        </div>
        <div class="detail-item">
          <label>首航/生效日期</label>
          <span>${formatDate(r.start_date) || '—'}</span>
        </div>
        <div class="detail-item">
          <label>抓取时间</label>
          <span>${formatDateTime(r.fetched_at) || '—'}</span>
        </div>
      </div>
      ${r.summary ? `<div class="detail-summary">${r.summary}</div>` : ''}
      <div class="detail-source">
        <div class="icon">📰</div>
        <div class="info">
          <div class="sname">${r.source_name || '未知来源'}</div>
          <a class="surl" href="${r.source_url || '#'}" target="_blank" rel="noopener">${r.source_url || '暂无链接'}</a>
        </div>
        ${r.source_url ? `<a class="open-btn" href="${r.source_url}" target="_blank" rel="noopener">打开原文 →</a>` : ''}
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  expandedId = expandedId === id ? null : id;
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const airline = document.getElementById('filter-airline').value;
  const type = document.getElementById('filter-type').value;

  let filtered = allRoutes.filter(r => {
    if (!isWithinDays(r.date, currentDays)) return false;
    if (airline && r.airline !== airline) return false;
    if (type && r.type !== type) return false;
    if (search) {
      const text = [r.airline, r.route, r.origin, r.destination, r.summary, r.source_name].join(' ').toLowerCase();
      if (!text.includes(search)) return false;
    }
    return true;
  });

  // Sort by date desc
  filtered.sort((a, b) => {
    const da = new Date(a.date || 0), db = new Date(b.date || 0);
    return db - da;
  });

  document.getElementById('result-count').textContent = filtered.length;
  const container = document.getElementById('cards-container');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🔍</div>
        <h3>暂无符合条件的航线信息</h3>
        <p>尝试调整筛选条件，或等待下次自动更新</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(buildCard).join('');
}

function selectDatePill(el, days) {
  document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentDays = days;
  applyFilters();
}

function initPage() {
  // Last updated
  const lu = document.getElementById('last-updated');
  if (__DATA__.last_updated) {
    try {
      lu.textContent = new Date(__DATA__.last_updated).toLocaleString('zh-CN', {
        month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    } catch { lu.textContent = __DATA__.last_updated; }
  }

  // Stats
  const newCount = allRoutes.filter(r => r.type === 'new_route').length;
  const promoCount = allRoutes.filter(r => r.type === 'promoted_route').length;
  document.getElementById('stat-total').textContent = allRoutes.length;
  document.getElementById('stat-new').textContent = newCount;
  document.getElementById('stat-promo').textContent = promoCount;

  // Airlines filter
  const airlines = [...new Set(allRoutes.map(r => r.airline).filter(Boolean))].sort();
  const sel = document.getElementById('filter-airline');
  airlines.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    sel.appendChild(opt);
  });

  // Airlines stat
  document.getElementById('stat-airlines').textContent = `共 ${airlines.length} 家航司`;

  applyFilters();
}

initPage();
</script>
